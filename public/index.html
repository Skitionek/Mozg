<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mozg – Cross-Database Query Interface</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2d3047;
      --accent:   #6c63ff;
      --accent2:  #ff6584;
      --text:     #e2e8f0;
      --muted:    #718096;
      --success:  #48bb78;
      --error:    #fc8181;
      --radius:   8px;
      --mono:     'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
    header h1 span { color: var(--accent); }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      margin-left: 1.2rem;
      transition: color .15s;
    }
    header nav a:hover { color: var(--text); }
    header nav a.active { color: var(--accent); }

    /* ── Layout ─────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.2rem;
    }

    .section-title {
      font-size: .7rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
      margin-top: 1.2rem;
    }
    .section-title:first-child { margin-top: 0; }

    label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: .25rem; margin-top: .6rem; }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .82rem;
      padding: .45rem .6rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1rem;
      border-radius: var(--radius);
      border: none;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--accent2); color: #fff; }
    .btn-full { width: 100%; justify-content: center; margin-top: .5rem; }
    .btn-sm { padding: .3rem .7rem; font-size: .75rem; }

    /* ── Relation chips ──────────────────────────────────────── */
    #relations-list { margin-top: .5rem; }
    .relation-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem .6rem;
      font-size: .75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .35rem;
    }
    .relation-chip span { color: var(--muted); }
    .relation-chip strong { color: var(--accent); margin-right: .3rem; }
    .remove-btn { background: none; border: none; color: var(--error); cursor: pointer; font-size: .9rem; padding: 0 .2rem; }

    /* ── Main panel ──────────────────────────────────────────── */
    main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-toolbar {
      padding: .8rem 1.2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .main-toolbar .spacer { flex: 1; }

    /* ── Panels ──────────────────────────────────────────────── */
    .panels {
      display: grid;
      grid-template-rows: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .panel:last-child { border-bottom: none; }

    .panel-header {
      padding: .5rem 1rem;
      font-size: .72rem;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .panel-header .badge {
      background: var(--accent);
      color: #fff;
      font-size: .65rem;
      padding: .1rem .4rem;
      border-radius: 20px;
    }
    .panel-header .badge.error { background: var(--error); color: var(--bg); }

    #query-editor {
      flex: 1;
      resize: none;
      background: var(--bg);
      border: none;
      color: #a8d8a8;
      font-family: var(--mono);
      font-size: .82rem;
      padding: .8rem 1rem;
      outline: none;
      line-height: 1.6;
    }

    #result-output {
      flex: 1;
      overflow: auto;
      padding: .8rem 1rem;
      font-family: var(--mono);
      font-size: .78rem;
      line-height: 1.6;
      white-space: pre;
    }
    .result-placeholder { color: var(--muted); font-family: var(--mono); font-size: .8rem; }

    /* Syntax highlighting */
    .json-key    { color: #81b1f7; }
    .json-str    { color: #f7c67b; }
    .json-num    { color: #b5f081; }
    .json-bool   { color: #f78bba; }
    .json-null   { color: var(--muted); }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .7rem 1.1rem;
      font-size: .82rem;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
      z-index: 100;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--error);   color: var(--error); }

    /* ── Loading spinner ─────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1><span>Mozg</span> – Cross-Database Query Interface</h1>
  <nav>
    <a href="/" class="active">Builder</a>
    <a href="/graphql" target="_blank">GraphiQL ↗</a>
  </nav>
</header>

<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside>

    <!-- Examples dropdown -->
    <div class="section-title" style="margin-top:0">Examples</div>
    <select id="examples-select">
      <option value="">— load an example —</option>
    </select>

    <div class="section-title">Connection</div>

    <label>Driver</label>
    <select id="conn-driver">
      <option value="sqlite3">SQLite</option>
      <option value="postgres">PostgreSQL</option>
      <option value="mysql">MySQL</option>
      <option value="neo4j">Neo4j</option>
      <option value="arango">ArangoDB</option>
      <option value="biocyc">BioCyc</option>
      <option value="rest">REST API</option>
    </select>

    <!-- Standard host/port/user/password group (SQL + graph DBs) -->
    <div id="conn-host-group">
      <div class="row2">
        <div>
          <label>Host</label>
          <input id="conn-host" type="text" value="localhost" placeholder="localhost" />
        </div>
        <div>
          <label>Port</label>
          <input id="conn-port" type="number" placeholder="5432" />
        </div>
      </div>
      <label>User</label>
      <input id="conn-user" type="text" placeholder="postgres" />
      <label>Password</label>
      <input id="conn-password" type="password" placeholder="••••••••" />
    </div>

    <!-- Scheme field (neo4j / arango) -->
    <div id="conn-scheme-group" class="hidden">
      <label>Scheme</label>
      <input id="conn-scheme" type="text" placeholder="bolt" />
    </div>

    <!-- REST-specific fields -->
    <div id="conn-rest-group" class="hidden">
      <label>API Key / Bearer Token (optional)</label>
      <input id="conn-api-key" type="text" placeholder="my-api-key" />
      <label>API Key Query Param (optional, e.g. api_key)</label>
      <input id="conn-api-key-param" type="text" placeholder="api_key" />
      <label>Extra Headers (JSON object, optional)</label>
      <textarea id="conn-headers" rows="2" placeholder='{"X-App-Id": "mozg"}'></textarea>
    </div>

    <label id="conn-db-label">Database / File</label>
    <input id="conn-database" type="text" placeholder=":memory:" />

    <button class="btn btn-secondary btn-full" onclick="introspect()">🔍 Introspect Schema</button>

    <!-- ── Query ── -->
    <div class="section-title">Query</div>

    <label>From (table / entity / path)</label>
    <input id="q-from" type="text" placeholder="users" list="tables-list" />
    <datalist id="tables-list"></datalist>

    <label>Select columns (comma-separated, blank = all)</label>
    <input id="q-select" type="text" placeholder="id, name, email" />

    <label>Where (JSON)</label>
    <textarea id="q-where" rows="2" placeholder='{"active": true}'></textarea>

    <div class="row2">
      <div>
        <label>Limit</label>
        <input id="q-limit" type="number" placeholder="50" />
      </div>
      <div>
        <label>Offset</label>
        <input id="q-offset" type="number" placeholder="0" />
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Order By</label>
        <input id="q-order-by" type="text" placeholder="created_at" />
      </div>
      <div>
        <label>Direction</label>
        <select id="q-order-dir">
          <option value="asc">ASC</option>
          <option value="desc">DESC</option>
        </select>
      </div>
    </div>

    <!-- ── Relations ── -->
    <div class="section-title">Relations</div>
    <div id="relations-list"></div>

    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem;margin-top:.3rem;">
      <label style="margin-top:0">Entity</label>
      <input id="rel-entity" type="text" placeholder="posts" list="tables-list" />
      <div class="row2">
        <div>
          <label>Type</label>
          <select id="rel-type">
            <option value="hasMany">hasMany</option>
            <option value="hasOne">hasOne</option>
            <option value="belongsTo">belongsTo</option>
          </select>
        </div>
        <div>
          <label>Alias</label>
          <input id="rel-alias" type="text" placeholder="posts" />
        </div>
      </div>
      <div class="row2">
        <div>
          <label>Local Key</label>
          <input id="rel-local-key" type="text" placeholder="id" />
        </div>
        <div>
          <label>Foreign Key</label>
          <input id="rel-foreign-key" type="text" placeholder="user_id" />
        </div>
      </div>
      <button class="btn btn-secondary btn-full btn-sm" style="margin-top:.4rem" onclick="addRelation()">+ Add Relation</button>
    </div>

    <button class="btn btn-secondary btn-full" style="margin-top:.6rem" onclick="generateQuery()">⚙ Generate GraphQL</button>

  </aside>

  <!-- ── Main ────────────────────────────────────────────────── -->
  <main>
    <div class="main-toolbar">
      <button class="btn btn-primary" onclick="runQuery()">
        <span class="spinner hidden" id="run-spinner"></span>
        ▶ Run Query
      </button>
      <button class="btn btn-secondary" onclick="clearResults()">✕ Clear</button>
      <div class="spacer"></div>
      <span id="timing" style="font-size:.75rem;color:var(--muted)"></span>
    </div>

    <div class="panels">
      <!-- GraphQL query editor -->
      <div class="panel">
        <div class="panel-header">
          GraphQL Query
          <span class="spacer" style="flex:1"></span>
          <button class="btn btn-secondary btn-sm" onclick="copyQuery()" style="font-size:.7rem;padding:.2rem .6rem;">Copy</button>
        </div>
        <textarea id="query-editor" spellcheck="false">{
  query(input: {
    connection: { driver: sqlite3, database: ":memory:" }
    from: "example_table"
    limit: 10
  }) {
    count
    data
  }
}</textarea>
      </div>

      <!-- Results -->
      <div class="panel">
        <div class="panel-header">
          Result
          <span id="result-badge" class="badge hidden">0</span>
        </div>
        <div id="result-output">
          <span class="result-placeholder">Run a query to see results here.</span>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────────
  const relations = [];
  let knownTables = [];
  let examplesData = [];

  // ── Load examples ─────────────────────────────────────────────
  async function loadExamples() {
    try {
      const res = await fetch('/examples/queries.json');
      if (!res.ok) return;
      examplesData = await res.json();
      const sel = document.getElementById('examples-select');
      for (const ex of examplesData) {
        const opt = document.createElement('option');
        opt.value = ex.name;
        opt.textContent = `[${ex.category}] ${ex.name}`;
        sel.appendChild(opt);
      }
    } catch { /* examples not critical */ }
  }

  document.getElementById('examples-select').addEventListener('change', function () {
    const ex = examplesData.find(e => e.name === this.value);
    if (!ex) return;
    document.getElementById('query-editor').value = ex.query;
    toast(`Loaded: ${ex.name}`, 'success');
    this.value = '';
  });

  // ── Driver visibility toggle ──────────────────────────────────
  function updateDriverUI() {
    const driver = document.getElementById('conn-driver').value;
    const isRest   = driver === 'rest';
    const isGraph  = driver === 'neo4j' || driver === 'arango';
    const isSqlite = driver === 'sqlite3';

    document.getElementById('conn-host-group').style.display  = (isRest || isSqlite) ? 'none' : 'block';
    document.getElementById('conn-scheme-group').classList.toggle('hidden', !isGraph);
    document.getElementById('conn-rest-group').classList.toggle('hidden', !isRest);

    const dbLabel = document.getElementById('conn-db-label');
    const dbInput = document.getElementById('conn-database');
    if (isRest) {
      dbLabel.textContent = 'Base URL';
      dbInput.placeholder = 'https://api.example.com';
    } else if (isSqlite) {
      dbLabel.textContent = 'Database File Path';
      dbInput.placeholder = ':memory:';
    } else {
      dbLabel.textContent = 'Database Name';
      dbInput.placeholder = 'mydb';
    }

    // Default ports
    const portMap = { postgres: '5432', mysql: '3306', neo4j: '7687', arango: '8529' };
    const portEl = document.getElementById('conn-port');
    if (!isRest && !isSqlite) portEl.placeholder = portMap[driver] || '';

    // Default scheme
    const schemeEl = document.getElementById('conn-scheme');
    if (driver === 'neo4j' && !schemeEl.value) schemeEl.placeholder = 'bolt';
    if (driver === 'arango' && !schemeEl.value) schemeEl.placeholder = 'http';

    generateQuery();
  }

  document.getElementById('conn-driver').addEventListener('change', updateDriverUI);

  // Fire once on load
  updateDriverUI();

  // Auto-generate on input changes
  [
    'conn-driver','conn-host','conn-port','conn-user','conn-password','conn-database',
    'conn-scheme','conn-api-key','conn-api-key-param','conn-headers',
    'q-from','q-select','q-where','q-limit','q-offset','q-order-by','q-order-dir',
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', generateQuery);
  });

  // ── Connection builder ────────────────────────────────────────
  function buildConnection() {
    const driver = document.getElementById('conn-driver').value;
    const database = document.getElementById('conn-database').value;
    const conn = { driver, database: database || (driver === 'sqlite3' ? ':memory:' : '') };

    if (driver !== 'sqlite3' && driver !== 'rest') {
      const host = document.getElementById('conn-host').value;
      const port = document.getElementById('conn-port').value;
      const user = document.getElementById('conn-user').value;
      const password = document.getElementById('conn-password').value;
      if (host) conn.host = host;
      if (port) conn.port = parseInt(port, 10);
      if (user) conn.user = user;
      if (password) conn.password = password;
    }

    if (driver === 'neo4j' || driver === 'arango') {
      const scheme = document.getElementById('conn-scheme').value;
      if (scheme) conn.scheme = scheme;
    }

    if (driver === 'rest') {
      const apiKey      = document.getElementById('conn-api-key').value;
      const apiKeyParam = document.getElementById('conn-api-key-param').value;
      const headersRaw  = document.getElementById('conn-headers').value.trim();
      if (apiKey) conn.user = apiKey;
      if (apiKeyParam) conn.apiKeyParam = apiKeyParam;
      if (headersRaw) {
        try { conn.headers = JSON.parse(headersRaw); } catch { /* ignore */ }
      }
    }

    return conn;
  }

  function connToGQL(conn) {
    const parts = Object.entries(conn).map(([k, v]) => {
      if (typeof v === 'number') return `${k}: ${v}`;
      if (typeof v === 'object' && v !== null) return `${k}: ${JSON.stringify(v)}`;
      return `${k}: ${JSON.stringify(v)}`;
    });
    return `{ ${parts.join(', ')} }`;
  }

  // ── Relations ────────────────────────────────────────────────
  function addRelation() {
    const entity     = document.getElementById('rel-entity').value.trim();
    const foreignKey = document.getElementById('rel-foreign-key').value.trim();
    if (!entity || !foreignKey) { toast('Entity and Foreign Key are required', 'error'); return; }

    const rel = {
      entity,
      type:       document.getElementById('rel-type').value,
      foreignKey,
      localKey:   document.getElementById('rel-local-key').value.trim() || null,
      alias:      document.getElementById('rel-alias').value.trim() || null,
    };
    relations.push(rel);
    renderRelations();
    ['rel-entity','rel-foreign-key','rel-local-key','rel-alias'].forEach(id => {
      document.getElementById(id).value = '';
    });
    generateQuery();
  }

  function removeRelation(idx) {
    relations.splice(idx, 1);
    renderRelations();
    generateQuery();
  }

  function renderRelations() {
    const list = document.getElementById('relations-list');
    list.innerHTML = relations.map((r, i) => `
      <div class="relation-chip">
        <span><strong>${r.type}</strong> → ${r.entity} (${r.foreignKey})</span>
        <button class="remove-btn" onclick="removeRelation(${i})">×</button>
      </div>
    `).join('');
  }

  function relToGQL(rel) {
    let s = `{ entity: ${JSON.stringify(rel.entity)}, foreignKey: ${JSON.stringify(rel.foreignKey)}, type: ${rel.type}`;
    if (rel.localKey) s += `, localKey: ${JSON.stringify(rel.localKey)}`;
    if (rel.alias)    s += `, alias: ${JSON.stringify(rel.alias)}`;
    s += ' }';
    return s;
  }

  // ── Generate GraphQL ──────────────────────────────────────────
  function generateQuery() {
    const conn      = buildConnection();
    const from      = document.getElementById('q-from').value.trim() || 'example_table';
    const selectRaw = document.getElementById('q-select').value.trim();
    const whereRaw  = document.getElementById('q-where').value.trim();
    const limit     = document.getElementById('q-limit').value;
    const offset    = document.getElementById('q-offset').value;
    const orderBy   = document.getElementById('q-order-by').value.trim();
    const orderDir  = document.getElementById('q-order-dir').value;

    let input = `connection: ${connToGQL(conn)}\n    from: ${JSON.stringify(from)}`;

    if (selectRaw) {
      const cols = selectRaw.split(',').map(s => JSON.stringify(s.trim())).join(', ');
      input += `\n    select: [${cols}]`;
    }
    if (whereRaw) {
      try { JSON.parse(whereRaw); input += `\n    where: ${whereRaw}`; } catch { /* ignore */ }
    }
    if (limit)   input += `\n    limit: ${parseInt(limit, 10)}`;
    if (offset)  input += `\n    offset: ${parseInt(offset, 10)}`;
    if (orderBy) {
      input += `\n    orderBy: ${JSON.stringify(orderBy)}`;
      input += `\n    orderDirection: ${orderDir}`;
    }
    if (relations.length > 0) {
      const rels = relations.map(r => `      ${relToGQL(r)}`).join('\n');
      input += `\n    relations: [\n${rels}\n    ]`;
    }

    const gql = `{\n  query(input: {\n    ${input}\n  }) {\n    count\n    data\n  }\n}`;
    document.getElementById('query-editor').value = gql;
  }

  // ── Run Query ────────────────────────────────────────────────
  async function runQuery() {
    const queryText = document.getElementById('query-editor').value.trim();
    if (!queryText) { toast('Query is empty', 'error'); return; }

    const spinner = document.getElementById('run-spinner');
    spinner.classList.remove('hidden');
    document.getElementById('timing').textContent = '';
    const t0 = performance.now();

    try {
      const res = await fetch('/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: queryText }),
      });
      const json = await res.json();
      const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
      document.getElementById('timing').textContent = `${elapsed}s`;
      renderResult(json);
    } catch (err) {
      renderResult({ errors: [{ message: err.message }] });
    } finally {
      spinner.classList.add('hidden');
    }
  }

  function renderResult(json) {
    const out   = document.getElementById('result-output');
    const badge = document.getElementById('result-badge');

    if (json.errors) {
      badge.textContent = '!';
      badge.className = 'badge error';
      badge.classList.remove('hidden');
      out.innerHTML = `<span style="color:var(--error)">${escapeHTML(json.errors.map(e => e.message).join('\n'))}</span>`;
      return;
    }

    const data = json.data;
    if (data && data.query) {
      badge.textContent = data.query.count;
      badge.className = 'badge';
      badge.classList.remove('hidden');
    } else if (data && data.introspect) {
      badge.textContent = data.introspect.tables.length + ' tables';
      badge.className = 'badge';
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }

    out.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
    toast('Query executed', 'success');
  }

  function clearResults() {
    document.getElementById('result-output').innerHTML =
      '<span class="result-placeholder">Run a query to see results here.</span>';
    document.getElementById('result-badge').classList.add('hidden');
    document.getElementById('timing').textContent = '';
  }

  // ── Introspect ────────────────────────────────────────────────
  async function introspect() {
    const conn = buildConnection();
    const gql = `{ introspect(connection: ${connToGQL(conn)}) { tables { name columns { name type nullable isPrimaryKey } } } }`;
    document.getElementById('query-editor').value = gql;

    const spinner = document.getElementById('run-spinner');
    spinner.classList.remove('hidden');

    try {
      const res = await fetch('/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: gql }),
      });
      const json = await res.json();
      renderResult(json);

      if (json.data && json.data.introspect) {
        knownTables = json.data.introspect.tables.map(t => t.name);
        const dl = document.getElementById('tables-list');
        dl.innerHTML = knownTables.map(n => `<option value="${escapeHTML(n)}"></option>`).join('');
        toast(`Found ${knownTables.length} tables`, 'success');
      }
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      spinner.classList.add('hidden');
    }
  }

  // ── Helpers ───────────────────────────────────────────────────
  function copyQuery() {
    navigator.clipboard.writeText(document.getElementById('query-editor').value)
      .then(() => toast('Copied!', 'success'))
      .catch(() => toast('Copy failed', 'error'));
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2500);
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function syntaxHighlight(json) {
    return escapeHTML(json).replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      match => {
        let cls = 'json-num';
        if (/^"/.test(match)) cls = /:$/.test(match) ? 'json-key' : 'json-str';
        else if (/true|false/.test(match)) cls = 'json-bool';
        else if (/null/.test(match)) cls = 'json-null';
        return `<span class="${cls}">${match}</span>`;
      }
    );
  }

  // ── Init ──────────────────────────────────────────────────────
  loadExamples();
  generateQuery();
</script>
</body>
